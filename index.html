<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chuyển đổi văn bản sang không dấu</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Chuyển đổi tên sang không dấu</h2>
    <textarea id="input" placeholder="Dán văn bản có dấu vào đây..."></textarea>
    <button onclick="convert()">Chuyển đổi</button>
    
    <h3>Kết quả:</h3>
    <textarea id="output" readonly></textarea>

    <script>
        function convert() {
            let str = document.getElementById("input").value;
            
            // Hàm loại bỏ dấu tiếng Việt
            str = str.toLowerCase();
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            
            // Xử lý thêm: thay thế khoảng trắng bằng dấu gạch ngang (thường dùng cho tên file)
            str = str.replace(/\s+/g, '-');
            
            // Loại bỏ các ký tự đặc biệt nếu muốn (tùy chọn)
            str = str.replace(/[^a-z0-9\-]/g, '');

            document.getElementById("output").value = str;
        }
    </script>
</body>
</html>
